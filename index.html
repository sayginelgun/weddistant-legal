<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weddistant | Your wedding assistant</title>
    <style>
        :root {
            --primary-color: #4E342E;
            --accent-color: #81C784;
            --text-color: #2C1E1B;
            --bg-color: #FBF8F6;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 40px 20px;
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--primary-color);
            letter-spacing: -1px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        p {
            max-width: 600px;
            line-height: 1.6;
            color: #6D4C41;
        }

        .download-buttons {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .btn {
            padding: 12px 25px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn-active {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-disabled {
            background-color: #E0E0E0;
            color: #9E9E9E;
            cursor: not-allowed;
        }

        .btn:hover:not(.btn-disabled) {
            transform: translateY(-2px);
        }

        footer {
            padding: 40px 20px;
            border-top: 1px solid #EFEBE9;
            text-align: center;
        }

        .legal-links {
            margin-bottom: 15px;
        }

        .legal-links a {
            color: var(--primary-color);
            text-decoration: none;
            margin: 0 10px;
            font-size: 0.9rem;
        }

        .legal-links a:hover {
            text-decoration: underline;
        }

        .copyright {
            font-size: 0.8rem;
            color: #A1887F;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Weddistant</div>
    </header>

    <main>
        <h1>Evlilik Serüveninizi Birlikte Planlayın</h1>
        <p>Mesafeler ne olursa olsun, bütçenizi ve hazırlıklarınızı eşinizle ortak yönetin. Weddistant çok yakında App Store ve Google Play'de!</p>

        <div class="download-buttons">
            <a href="#" class="btn btn-disabled">
                <span>App Store</span>
            </a>
            <a href="#" class="btn btn-disabled">
                <span>Google Play</span>
            </a>
        </div>
    </main>

    <footer>
        <div class="legal-links">
            <a href="privacy.html">Gizlilik Koşulları</a>
            <a href="terms.html">Aydınlatma Metni (KVKK)</a>
        </div>
        <div class="copyright">
            &copy; 2026 Weddistant. Tüm hakları saklıdır.
        </div>
    </footer>

</body>
</html>
