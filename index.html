<!DOCTYPE html>
<html>
<head>
    <title>Weddistant'a Davetlisin!</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script>
        function redirect() {
    const urlParams = new URLSearchParams(window.location.search);
    const inviteCode = urlParams.get('code');
    
    if (!inviteCode) {
        document.body.innerHTML = "<h2>Geçersiz davet kodu.</h2>";
        return;
    }

    // XML'deki host="invite" tanımına tam uyum:
    const appLink = "weddistant://invite?code=" + inviteCode;
    const playStore = "https://play.google.com/store/apps/details?id=com.weddistant.app";
    const appStore = "https://apps.apple.com/app/weddistant/id123456789";

    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    const isAndroid = /Android/i.test(navigator.userAgent);

    // 1. ANDROID İÇİN INTENT (En Garanti Yöntem)
    if (isAndroid) {
        // Intent yapısı: Uygulama varsa açar, yoksa S.browser_fallback_url'e gider.
        const androidIntent = `intent://invite?code=${inviteCode}#Intent;scheme=weddistant;package=com.weddistant.app;S.browser_fallback_url=${encodeURIComponent(playStore)};end`;
        window.location.href = androidIntent;
    } 
    // 2. iOS İÇİN
    else if (isIOS) {
        // iOS'te doğrudan yönlendirme:
        window.location.href = appLink;
        
        // Eğer uygulama açılmazsa 2.5 saniye sonra App Store'a at
        setTimeout(function() {
            if (!document.webkitHidden && !document.hidden) {
                window.location.href = appStore;
            }
        }, 2500);
    } 
    // 3. MASAÜSTÜ VEYA DİĞER
    else {
        window.location.href = "https://weddistant.com";
    }
}
    </script>
</head>
<body onload="redirect()">
    <div style="text-align: center; padding-top: 50px; font-family: sans-serif;">
        <h2>Weddistant'a Yönlendiriliyorsunuz...</h2>
        <p>Uygulama açılmazsa mağazaya yönlendirileceksiniz.</p>
    </div>
</body>
</html>
